term xterm-256color
shell_integration no-cursor
enable_audio_bell no
wayland_enable_ime no
hide_window_decorations yes

window_padding_width 2
inactive_text_alpha 0.7
active_border_color #888888
inactive_border_color #888888
enabled_layouts splits:split_axis=horizontal

font_family family="MesloLGS Nerd Font Mono"
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.0

cursor none
cursor_shape block

tab_title_template "{bell_symbol}{activity_symbol} {index}: {title}"
tab_bar_edge top
tab_bar_style slant

clear_all_shortcuts yes

map_timeout 2.0
map --new-mode cz --on-action end ctrl+z
map --mode cz ctrl+z send_key ctrl+z

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0

map --mode cz c close_window_with_confirmation
map --mode cz d detach_window new-tab
map --mode cz q discard_event

map ctrl+n new_tab_with_cwd
map --mode cz n new_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

map --mode cz s launch --location=hsplit
map --mode cz v launch --location=vsplit

map alt+h neighboring_window left
map alt+j neighboring_window bottom
map alt+k neighboring_window top
map alt+l neighboring_window right

map alt+shift+h move_window left
map alt+shift+j move_window bottom
map alt+shift+k move_window top
map alt+shift+l move_window right
